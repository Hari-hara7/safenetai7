<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SafeNet AI Extension Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="head">
        <div class="brand">
          <div class="logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="m9 12 2 2 4-4"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
          <div>
            <div class="title">SafeNet AI Extension</div>
            <div class="subtitle">Options</div>
          </div>
        </div>
      </header>

      <section class="card">
        <label class="field">
          <div class="label">SafeNet AI base URL</div>
          <div class="help">Use `http://localhost:3000` for local dev, or your deployed domain in production.</div>
          <input id="baseUrl" type="url" placeholder="https://your-safenet-domain.com" />
        </label>

        <div class="actions">
          <button id="save" class="btn primary">Save</button>
          <button id="reset" class="btn">Reset</button>
        </div>

        <div id="status" class="status" aria-live="polite"></div>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
